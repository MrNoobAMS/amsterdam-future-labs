  <!-- leaf on plate -->
  <path d="M48 62c-7-4-10-10-7-17 7-3 13 0 16 6 2 5 0 9-4 11-1.7.8-3.4.8-5 0z" fill="url(#leaf)"/>
  <path d="M44 59c3-4 7-7 11-8" fill="none" stroke="#0f2418" stroke-width="2" stroke-linecap="round"/>
  <!-- checkmark badge -->
  <circle cx="68" cy="70" r="11" fill="#3bae6e"/>
  <path d="M63 70l3.5 3.5L74 66" fill="none" stroke="#081209" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
