<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2418"/>
      <stop offset="1" stop-color="#081209"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3bae6e"/>
      <stop offset="1" stop-color="#8ee0ae"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="22" fill="url(#bg)"/>
  <!-- plate -->
  <circle cx="48" cy="50" r="26" fill="none" stroke="#3d5c4a" stroke-width="3"/>
  <circle cx="48" cy="50" r="17" fill="none" stroke="#3d5c4a" stroke-width="2" opacity="0.6"/>
  <!-- fork -->
  <path d="M14 30v12a4 4 0 0 0 4 4v22M11 30v9m6-9v9" fill="none" stroke="#3d5c4a" stroke-width="3" stroke-linecap="round"/>
  <!-- knife -->
