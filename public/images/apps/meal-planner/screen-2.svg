<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 956" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3bae6e"/>
      <stop offset="1" stop-color="#6fcf97"/>
    </linearGradient>
  </defs>
  <rect width="440" height="956" fill="#0e1611"/>
  <text x="30" y="48" font-size="15" font-weight="600" fill="#e8f2ea">9:41</text>
  <rect x="360" y="36" width="24" height="12" rx="3" fill="none" stroke="#e8f2ea" stroke-width="1.5" opacity="0.8"/>
  <rect x="362" y="38" width="16" height="8" rx="1.5" fill="#e8f2ea" opacity="0.8"/>

  <text x="30" y="118" font-size="27" font-weight="700" fill="#e8f2ea">Planner</text>

  <!-- day strip -->
  <g font-size="12" text-anchor="middle">
    <rect x="30" y="142" width="48" height="64" rx="14" fill="#16241b"/>
    <text x="54" y="168" fill="#93a89a">Mon</text>
    <text x="54" y="192" font-weight="700" fill="#e8f2ea">9</text>
    <rect x="86" y="142" width="48" height="64" rx="14" fill="#3bae6e"/>
    <text x="110" y="168" fill="#0e1611" font-weight="600">Tue</text>
    <text x="110" y="192" font-weight="700" fill="#0e1611">10</text>
    <rect x="142" y="142" width="48" height="64" rx="14" fill="#16241b"/>
    <text x="166" y="168" fill="#93a89a">Wed</text>
    <text x="166" y="192" font-weight="700" fill="#e8f2ea">11</text>
    <rect x="198" y="142" width="48" height="64" rx="14" fill="#16241b"/>
    <text x="222" y="168" fill="#93a89a">Thu</text>
    <text x="222" y="192" font-weight="700" fill="#e8f2ea">12</text>
    <rect x="254" y="142" width="48" height="64" rx="14" fill="#16241b"/>
    <text x="278" y="168" fill="#93a89a">Fri</text>
    <text x="278" y="192" font-weight="700" fill="#e8f2ea">13</text>
    <rect x="310" y="142" width="48" height="64" rx="14" fill="#16241b"/>
    <text x="334" y="168" fill="#93a89a">Sat</text>
    <text x="334" y="192" font-weight="700" fill="#e8f2ea">14</text>
    <rect x="366" y="142" width="48" height="64" rx="14" fill="#16241b"/>
    <text x="390" y="168" fill="#93a89a">Sun</text>
    <text x="390" y="192" font-weight="700" fill="#e8f2ea">15</text>
  </g>

  <!-- plan my week CTA -->
  <rect x="30" y="226" width="380" height="56" rx="18" fill="url(#cta)"/>
  <text x="150" y="260" font-size="15" font-weight="700" fill="#0e1611">✨ Plan my week</text>

  <!-- meal slots -->
  <g>
    <rect x="30" y="306" width="380" height="92" rx="18" fill="#16241b"/>
    <text x="46" y="334" font-size="11" font-weight="700" letter-spacing="1" fill="#6fcf97">BREAKFAST</text>
    <rect x="46" y="346" width="44" height="40" rx="10" fill="#23402e"/>
    <text x="56" y="374" font-size="20">🍳</text>
    <text x="104" y="362" font-size="15" font-weight="600" fill="#e8f2ea">Veggie Scramble</text>
    <text x="104" y="382" font-size="12" fill="#93a89a">380 kcal · 26 g protein · 2 servings</text>
  </g>
  <g>
    <rect x="30" y="410" width="380" height="92" rx="18" fill="#16241b"/>
    <text x="46" y="438" font-size="11" font-weight="700" letter-spacing="1" fill="#6fcf97">LUNCH</text>
    <rect x="46" y="450" width="44" height="40" rx="10" fill="#23402e"/>
    <text x="56" y="478" font-size="20">🌯</text>
    <text x="104" y="466" font-size="15" font-weight="600" fill="#e8f2ea">Turkey Wrap</text>
    <text x="104" y="486" font-size="12" fill="#93a89a">510 kcal · 36 g protein · 2 servings</text>
  </g>
  <g>
    <rect x="30" y="514" width="380" height="92" rx="18" fill="#16241b"/>
    <text x="46" y="542" font-size="11" font-weight="700" letter-spacing="1" fill="#6fcf97">DINNER</text>
    <rect x="46" y="554" width="44" height="40" rx="10" fill="#23402e"/>
    <text x="56" y="582" font-size="20">🍛</text>
    <text x="104" y="570" font-size="15" font-weight="600" fill="#e8f2ea">Chickpea Curry</text>
    <text x="104" y="590" font-size="12" fill="#93a89a">620 kcal · 28 g protein · 4 servings</text>
  </g>
  <g>
    <rect x="30" y="618" width="380" height="92" rx="18" fill="#16241b"/>
    <text x="46" y="646" font-size="11" font-weight="700" letter-spacing="1" fill="#6fcf97">SNACK</text>
    <rect x="46" y="658" width="44" height="40" rx="10" fill="#23402e" opacity="0.5"/>
    <text x="59" y="687" font-size="20" fill="#3d5c4a">+</text>
    <text x="104" y="674" font-size="14" fill="#5e7264">Add a snack</text>
  </g>

  <!-- day summary pills -->
  <rect x="30" y="734" width="184" height="48" rx="16" fill="#16241b"/>
  <text x="50" y="763" font-size="13" fill="#93a89a">Day · <tspan font-weight="700" fill="#e8f2ea">1 510 kcal</tspan></text>
  <rect x="226" y="734" width="184" height="48" rx="16" fill="#16241b"/>
  <text x="246" y="763" font-size="13" fill="#93a89a">Protein · <tspan font-weight="700" fill="#e8f2ea">90 g</tspan></text>

  <!-- tab bar -->
  <rect x="0" y="868" width="440" height="88" fill="#121b15"/>
  <text x="46" y="932" font-size="10" fill="#5e7264">Home</text>
  <circle cx="142" cy="904" r="4" fill="#3bae6e"/>
  <text x="124" y="932" font-size="10" fill="#3bae6e">Planner</text>
  <text x="208" y="932" font-size="10" fill="#5e7264">Recipes</text>
  <text x="288" y="932" font-size="10" fill="#5e7264">Shopping</text>
  <text x="372" y="932" font-size="10" fill="#5e7264">Profile</text>
</svg>
