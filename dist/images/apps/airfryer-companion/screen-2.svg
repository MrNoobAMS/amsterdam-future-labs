  <rect x="54" y="196" width="64" height="24" rx="12" fill="#f4ece1"/>
  <text x="68" y="212" font-size="11" font-weight="700" fill="#7c6f61">OVEN</text>
  <text x="54" y="266" font-size="13" fill="#9c8d7d">Temperature</text>
  <text x="54" y="306" font-size="34" font-weight="700" fill="#2b2620">200°C</text>
  <text x="250" y="266" font-size="13" fill="#9c8d7d">Time</text>
  <text x="250" y="306" font-size="34" font-weight="700" fill="#2b2620">25 min</text>

  <!-- arrow -->
  <circle cx="220" cy="402" r="30" fill="#f5a623"/>
  <path d="M220 388v24M211 404l9 9 9-9" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- airfryer panel -->
  <rect x="30" y="446" width="380" height="210" rx="24" fill="#2b2620"/>
