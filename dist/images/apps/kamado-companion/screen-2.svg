<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 956" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="img" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a2412"/>
      <stop offset="1" stop-color="#22130b"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#e2552c"/>
      <stop offset="1" stop-color="#f7c14b"/>
    </linearGradient>
  </defs>
  <rect width="440" height="956" fill="#15100d"/>

  <!-- photo header -->
  <rect width="440" height="300" fill="url(#img)"/>
  <path d="M220 110c18 26 36 39 36 61 0 22-16 37-36 37s-36-15-36-37c0-12 5-22 13.5-32 4.8 6.8 9.6 10.4 14.4 11.2-1.7-14.4 1.6-27.8 8.1-40.2z" fill="url(#flame)" opacity="0.85"/>
  <text x="30" y="48" font-size="15" font-weight="600" fill="#fff">9:41</text>
  <circle cx="46" cy="92" r="18" fill="rgba(0,0,0,0.4)"/>
  <path d="M52 84l-10 8 10 8" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="30" y="354" font-size="26" font-weight="700" fill="#f2e9e2">Reverse Sear Ribeye</text>
  <text x="30" y="382" font-size="13" fill="#a89a8e">Beef · Medium difficulty · 45 min</text>

  <!-- info cards -->
  <g>
    <rect x="30" y="408" width="120" height="92" rx="18" fill="#221913"/>
    <text x="50" y="442" font-size="11" fill="#a89a8e">DOME</text>
    <text x="50" y="474" font-size="22" font-weight="700" fill="#f08a3c">250°C</text>
  </g>
  <g>
    <rect x="160" y="408" width="120" height="92" rx="18" fill="#221913"/>
    <text x="180" y="442" font-size="11" fill="#a89a8e">CORE</text>
    <text x="180" y="474" font-size="22" font-weight="700" fill="#f08a3c">54°C</text>
  </g>
  <g>
    <rect x="290" y="408" width="120" height="92" rx="18" fill="#221913"/>
    <text x="310" y="442" font-size="11" fill="#a89a8e">REST</text>
    <text x="310" y="474" font-size="22" font-weight="700" fill="#f08a3c">10 min</text>
  </g>

  <!-- steps -->
  <text x="30" y="556" font-size="18" font-weight="700" fill="#f2e9e2">Method</text>
  <g>
    <circle cx="46" cy="596" r="14" fill="#e2552c"/>
    <text x="42" y="601" font-size="12" font-weight="700" fill="#fff">1</text>
    <text x="74" y="592" font-size="14" fill="#d9cabc">Set up for indirect heat at 120°C</text>
    <text x="74" y="610" font-size="12" fill="#8d7d70">Heat deflector in, vents barely open</text>
  </g>
  <g>
    <circle cx="46" cy="660" r="14" fill="#e2552c"/>
    <text x="42" y="665" font-size="12" font-weight="700" fill="#fff">2</text>
    <text x="74" y="656" font-size="14" fill="#d9cabc">Cook to 46°C core temperature</text>
    <text x="74" y="674" font-size="12" fill="#8d7d70">About 30 minutes for a 4 cm steak</text>
  </g>
  <g>
    <circle cx="46" cy="724" r="14" fill="#e2552c"/>
    <text x="42" y="729" font-size="12" font-weight="700" fill="#fff">3</text>
    <text x="74" y="720" font-size="14" fill="#d9cabc">Open vents, sear 1 min per side</text>
    <text x="74" y="738" font-size="12" fill="#8d7d70">Dome at 250°C+, grate screaming hot</text>
  </g>
  <g>
    <circle cx="46" cy="788" r="14" fill="#3a2317"/>
    <text x="42" y="793" font-size="12" font-weight="700" fill="#c9b8aa">4</text>
    <text x="74" y="784" font-size="14" fill="#d9cabc">Rest 10 minutes under foil</text>
    <text x="74" y="802" font-size="12" fill="#8d7d70">Core climbs to a perfect 54°C</text>
  </g>

  <rect x="30" y="850" width="380" height="56" rx="28" fill="#e2552c"/>
  <text x="158" y="884" font-size="16" font-weight="700" fill="#fff">Plan this BBQ</text>
</svg>
