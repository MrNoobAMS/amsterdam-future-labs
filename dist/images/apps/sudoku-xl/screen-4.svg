<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 956" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <rect width="440" height="956" fill="#f7f8fe"/>
  <text x="30" y="48" font-size="15" font-weight="600" fill="#1c1e2e">9:41</text>

  <text x="30" y="112" font-size="27" font-weight="700" fill="#1c1e2e">Statistics</text>

  <!-- summary cards -->
  <g>
    <rect x="30" y="142" width="183" height="100" rx="20" fill="#fff" stroke="#d9dcf0"/>
