  <g>
    <rect x="56" y="766" width="30" height="40" rx="6" fill="#3a47b8"/>
    <rect x="100" y="778" width="30" height="28" rx="6" fill="#3a47b8"/>
    <rect x="144" y="760" width="30" height="46" rx="6" fill="#5b6bf5"/>
    <rect x="188" y="784" width="30" height="22" rx="6" fill="#3a47b8"/>
    <rect x="232" y="756" width="30" height="50" rx="6" fill="#5b6bf5"/>
    <rect x="276" y="770" width="30" height="36" rx="6" fill="#3a47b8"/>
    <rect x="320" y="748" width="30" height="58" rx="6" fill="#8b95ff"/>
  </g>

  <!-- tab bar -->
  <rect x="0" y="868" width="440" height="88" fill="#fff"/>
