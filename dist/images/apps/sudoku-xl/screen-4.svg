    <text x="52" y="330" font-size="30" font-weight="700" fill="#1c1e2e">4:51</text>
  </g>
  <g>
    <rect x="227" y="256" width="183" height="100" rx="20" fill="#fff" stroke="#d9dcf0"/>
    <text x="249" y="290" font-size="12" fill="#8a8fa8">ACCURACY</text>
    <text x="249" y="330" font-size="30" font-weight="700" fill="#1c1e2e">97%</text>
  </g>

  <!-- average time per difficulty -->
  <rect x="30" y="384" width="380" height="300" rx="24" fill="#fff" stroke="#d9dcf0"/>
  <text x="56" y="424" font-size="16" font-weight="700" fill="#1c1e2e">Average solve time</text>

  <g font-size="13" fill="#4a4e63">
    <text x="56" y="472">Easy</text>
    <rect x="140" y="458" width="160" height="18" rx="9" fill="#c9d0ff"/>
    <text x="316" y="472" fill="#8a8fa8">5:42</text>

    <text x="56" y="520">Medium</text>
    <rect x="140" y="506" width="210" height="18" rx="9" fill="#9aa5ff"/>
