    <text x="56" y="568">Hard</text>
    <rect x="140" y="554" width="248" height="18" rx="9" fill="#5b6bf5"/>
    <text x="56" y="568" opacity="0"></text>
    <text x="398" y="568" fill="#8a8fa8" text-anchor="end">19:04</text>

    <text x="56" y="616">Expert</text>
    <rect x="140" y="602" width="120" height="18" rx="9" fill="#3a47b8"/>
    <text x="276" y="616" fill="#8a8fa8">31:27</text>
  </g>
  <text x="56" y="656" font-size="12" fill="#aab0cc">Based on your last 50 puzzles</text>

  <!-- weekly activity -->
  <rect x="30" y="704" width="380" height="130" rx="24" fill="#1c1e2e"/>
